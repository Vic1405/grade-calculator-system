<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Grading System</title>

<style>
*{box-sizing:border-box;}


body{
  font-family:'Segoe UI',sans-serif;
  margin:0; padding:20px;
  color:white;
  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.6)), url("tech.jpg");
  background-size:cover;
  background-position:center;
  min-height:100vh;
}

/* GLASS CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:25px;
  border-radius:18px;
  background:rgba(58, 132, 241, 0.074);
  backdrop-filter:blur(3px);
  border:1px solid rgba(9, 214, 229, 0.638);
  box-shadow:0px 0 32px rgba(0, 0, 160, 0.708);
}
.owner{text-align:center;color:#ccc;margin-bottom:5px;letter-spacing:1px;}
h2{text-align:center;color:#00eaff;margin-bottom:20px;
font-size: 36px;
}

/* INPUT */
input{
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(0,0,0,0.4);
  color:white;
  margin:5px;
}

/* BUTTONS */
button{
  padding:9px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.25s;
}
.add-btn{background:#08066e;color:white;}
.add-btn:hover{background:#03022e;color:white; }
.generate-btn{background:#08066e;color:white;}
.generate-btn:hover{background:#03022e;color:white; }
.reset-btn{background:#830000;color:white;}
.reset-btn:hover{background:#630101;color:white;}
button:hover{transform:scale(1.04);opacity:0.9;}


/* Subject row input + delete button */
.subject-row {
  display: flex;
  gap: 8px;
  margin-top: 5px;
  align-items: center;
}

.subject-row input {
  flex: 1;           /* take remaining space */
  max-width: 250px;  /* set max width */
  padding: 6px 8px;
  font-size: 14px;
}

.subject-row button {
  flex: 0 0 auto;    /* button does not stretch */
  width: 80px;       /* fixed width */
  height: 35px;
  padding: 0;
  font-size: 14px;
}

/* Student name input aligns with subject inputs */
#studentName {
  width: 250px;      /* same width as subject input */
  padding: 6px 8px;
  font-size: 14px;
  margin-bottom: 10px;
}


/* BUTTONS */
.delete-btn{
  background:#9c0505;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:28px;   /* smaller height */
  padding:0 8px; /* smaller padding */
  font-size:12px;
  border-radius:6px;
}
.delete-btn:hover{
  background:#740303;
  transform:scale(1.03);opacity:0.9;
}

/* TABLE */
.table-wrapper{
  overflow-x:auto;
  display:none; /* hide initially */
}
#gradingSheet{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  min-width:600px;
}
#gradingSheet th{
  background:rgba(27, 0, 103, 0.951);
  color:white;
  padding:12px;
}
#gradingSheet td{
  border:1px solid rgba(255,255,255,0.2);
  padding:10px;
  text-align:center;
  background:rgba(0,0,0,0.4);
}
.gradeInput{
  width:60px;
  text-align:center;
  max-width:60px;
}
#searchBar{width:100%;padding:10px;margin-top:15px;border-radius:8px;}

/* RESPONSIVE */
@media (max-width:768px){
  .container{padding:15px;}
  #gradingSheet{font-size:12px;}
  .gradeInput{width:50px;}
  .subject-row input{flex:1 1 100%;}
  .subject-row button{
    flex: 0 0 auto; 
    width: 70px;       /* fixed width for the delete button */
    height: 30px;      /* adjust height as needed */
    padding: 0;
    font-size: 14px;
}
}

</style>
</head>

<body>
    
<div class="container">

<div class="owner">JOHN ROVIC LABISTE BSIT-3A</div>
<h2>College Grading System</h2>

<input type="text" id="studentName" placeholder="Student Name">

<div id="subjects"></div>

<button class="add-btn" onclick="addSubject()">+ Add Subject</button>
<button class="generate-btn" onclick="generateSheet()">Generate</button>
<button class="reset-btn" onclick="resetAll()">Reset</button>

<input type="text" id="searchBar" placeholder="Search Student..." onkeyup="searchStudent()">

<div class="table-wrapper" id="tableWrapper">
<table id="gradingSheet">
<thead>
<tr id="sheetHeader">
<th>No.</th>
<th>Name</th>
<th>Average</th>
<th>Equivalent</th>
<th>Action</th>
</tr>
</thead>
<tbody id="sheetBody"></tbody>
</table>
</div>

</div>

<script>
let subjectsList=[]
let studentCount=0

function addSubject(){
  const div=document.createElement("div")
  div.className="subject-row"
  div.innerHTML=`<input type="text" placeholder="Subject Name"><button class="delete-btn" onclick="removeSubject(this)">Delete</button>`
  document.getElementById("subjects").appendChild(div)
}

function removeSubject(btn){
  btn.parentElement.remove()
}

function generateSheet(){
  const name=document.getElementById("studentName").value.trim()
  if(name===""){alert("Enter student name");return}

  const subjectRows=document.querySelectorAll(".subject-row")
  let newSubjects=[]

  subjectRows.forEach(row=>{
    let sub=row.children[0].value.trim().toUpperCase()
    if(sub!=="" && !subjectsList.includes(sub)){
      newSubjects.push(sub)
      subjectsList.push(sub)
    }
  })

  /* ADD NEW SUBJECT COLUMNS */
  if(newSubjects.length>0){

    const header=document.getElementById("sheetHeader")

    newSubjects.forEach(sub=>{
      const th=document.createElement("th")
      th.innerText=sub

      header.insertBefore(th,header.children[header.children.length-3])

      /* ADD EMPTY CELL TO EXISTING ROWS */
      document.querySelectorAll("#sheetBody tr").forEach(row=>{
        const td=document.createElement("td")
        td.innerHTML=`<input type="number" min="0" max="99" class="gradeInput" oninput="limitDigits(this);calculateAverage(this)">`
        row.insertBefore(td,row.children[row.children.length-3])
      })
    })
  }

  /* CREATE NEW STUDENT ROW */
  const tr=document.createElement("tr")
  studentCount++

  let rowHTML=`<td>${studentCount}</td><td>${name}</td>`

  subjectsList.forEach(()=>{
    rowHTML+=`<td><input type="number" min="0" max="99" class="gradeInput" oninput="limitDigits(this);calculateAverage(this)"></td>`
  })

  rowHTML+=`
  <td class="avg">0</td>
  <td class="equiv">-</td>
  <td><button class="delete-btn" onclick="deleteRow(this)">Delete</button></td>
  `

  tr.innerHTML=rowHTML

  document.getElementById("sheetBody").appendChild(tr)
  document.getElementById("studentName").value=""

  document.getElementById("tableWrapper").style.display="block"
}

function limitDigits(input){
  if(input.value.length>2) input.value=input.value.slice(0,2)
  if(input.value>99) input.value=99
}

function calculateAverage(input){
  const row=input.closest("tr")
  const grades=row.querySelectorAll(".gradeInput")

  let total=0
  let count=0

  grades.forEach(g=>{
    let val=parseFloat(g.value)
    if(!isNaN(val)){
      total+=val
      count++
    }
  })

  let avg=count?total/count:0
  row.querySelector(".avg").innerText=avg.toFixed(2)

  let equiv=parseFloat(gradeEquivalent(avg))
  row.querySelector(".equiv").innerText=equiv.toFixed(2)
}

function gradeEquivalent(avg){
  if(avg>=97) return "1.0"
  if(avg>=94) return "1.25"
  if(avg>=91) return "1.5"
  if(avg>=88) return "1.75"
  if(avg>=85) return "2.0"
  if(avg>=82) return "2.25"
  if(avg>=79) return "2.5"
  if(avg>=76) return "2.75"
  if(avg>=75) return "3.0"
  return "5.0"
}

function deleteRow(btn){
  btn.closest("tr").remove()
  updateNumbering()
}

function updateNumbering(){
  let rows=document.querySelectorAll("#sheetBody tr")
  let count=1
  rows.forEach(r=>{
    r.children[0].innerText=count++
  })
  studentCount=rows.length
}

function resetAll(){
  document.getElementById("sheetBody").innerHTML=""
  document.getElementById("subjects").innerHTML=""
  document.getElementById("studentName").value=""
  document.getElementById("sheetHeader").innerHTML=`<th>No.</th><th>Name</th><th>Average</th><th>Equivalent</th><th>Action</th>`
  document.getElementById("tableWrapper").style.display="none"

  subjectsList=[]
  studentCount=0
}

function searchStudent(){
  let input=document.getElementById("searchBar").value.toLowerCase()

  document.querySelectorAll("#sheetBody tr").forEach(r=>{
    let name=r.children[1].innerText.toLowerCase()
    r.style.display=name.includes(input)?"":"none"
  })
}
</script>
</html>
